services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - SQLALCHEMY_DATABASE_URL=sqlite:////app/db/sandbox.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/db:/app/db
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    container_name: qalab-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
