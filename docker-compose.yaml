version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qalab-backend
    environment:
      - SQLALCHEMY_DATABASE_URL=sqlite:////app/db/sandbox.db
    volumes:
      - ./backend/db:/app/db
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qalab-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    container_name: qalab-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-stage.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: qalab-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
